<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="contacto.css" />
  </head>
  <body>
    <header class="header-main">
      <div class="header-logo">
        <a class="text_primary" href="./index.html"
          >Sport&<span class="text-primary">Life</span></a
        >
      </div>
      <nav class="nav-principal">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="./nutricion.html" target="_blank" class="nav-link"
              >Nutrición</a
            >
          </li>
          <li class="nav-item">
            <a href="./contacto.html" target="_blank" class="nav-link"
              >Contacto</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="section-contact">
        <div class="contact-container">
          <div class="contact-header">
            <h2 class="section-title">
              ¿Listo para el <span class="text-primary">Siguiente Nivel</span>?
            </h2>
            <p class="text-white">
              Déjanos tus datos y un coach se pondrá en contacto contigo en
              menos de 24 horas.
            </p>
          </div>

          <form action="#" class="contact-form">
            <div class="form-grid">
              <div class="input-group">
                <label for="name" class="text-white">Nombre Completo</label>
                <input
                  type="text"
                  id="name"
                  placeholder="Ej. Juan Pérez"
                  required
                />
              </div>

              <div class="input-group">
                <label for="email" class="text-white">Correo Electrónico</label>
                <input
                  type="email"
                  id="email"
                  placeholder="correo@ejemplo.com"
                  required
                />
              </div>

              <div class="input-group">
                <label for="interest" class="text-white"
                  >Disciplina de Interés</label
                >
                <select id="interest">
                  <option value="pesas">Entrenamiento de Fuerza</option>
                  <option value="boxeo">Boxeo / HIIT</option>
                  <option value="baile">Baile (Salsa, Bachata, Twerk)</option>
                  <option value="nutricion">Asesoría Nutricional</option>
                </select>
              </div>

              <div class="input-group">
                <label for="phone" class="text-white"
                  >Teléfono (WhatsApp)</label
                >
                <input
                  type="tel"
                  id="phone"
                  placeholder="300 123 1234"
                  maxlength="10"
                  pattern="[0-9]{10}"
                  required
                />
              </div>
            </div>

            <div class="input-group">
              <label for="message" class="text-white"
                >¿Cuál es tu objetivo?</label
              >
              <textarea
                id="message"
                rows="4"
                placeholder="Cuéntanos brevemente sobre tu meta actual..."
              ></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Solicitud</button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 FitLife - Diseño Web Fitness</p>
    </footer>
  </body>
</html>
